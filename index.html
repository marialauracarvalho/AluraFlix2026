<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <title>Mundo Mágico da Maria Laura</title>
    
    <style>
        /* Fundo Arco-Íris Pastel Animado */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffebfc, #e8dbfc, #d4f0ff, #e1fffd);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #5c4a78;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efeito de Estrelinhas Brilhantes no Fundo */
        .estrelas-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle, #fff 10%, transparent 11%),
                radial-gradient(circle, #fff 15%, transparent 16%);
            background-size: 180px 180px, 250px 250px;
            background-position: 0 0, 50px 50px;
            opacity: 0.5;
            z-index: -1;
        }

        /* Topo do Site (Header) */
        header {
            font-family: 'Fredoka One', cursive;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            padding: 25px;
            text-align: center;
            font-size: 2.5rem;
            color: #ff5c8a;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffb3c6;
            border-bottom: 5px dashed #ffb3c6;
            box-shadow: 0 4px 15px rgba(255, 179, 198, 0.3);
        }

        /* Seção Principal (Vídeo em Destaque) */
        .chamada {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.4);
            margin: 30px auto;
            max-width: 1100px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(200, 150, 220, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.6);
        }
